services:
  - type: web
    name: voxerameta-backend
    env: node
    region: frankfurt
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: LOCAL_STORAGE_PATH
        value: /tmp/voxerameta-songs
      - key: MAX_REQUESTS_PER_MINUTE
        value: 20
      # Aşağıdakileri Render Dashboard > Environment'tan ekle:
      # API_AUTH_TOKEN   → Kendin belirle
      # GROQ_API_KEY     → console.groq.com
      # OPENROUTER_API_KEY → openrouter.ai
      # GEMINI_API_KEY   → aistudio.google.com
      # HUGGINGFACE_API_KEY → huggingface.co
      # BASE_URL         → https://SENIN-APP-ADIN.onrender.com
